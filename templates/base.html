<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}网络变更方案智能化处理平台{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-diagram-3"></i> 网络变更方案智能化处理平台
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link {% block nav_a %}{% endblock %}" href="/">
                            <i class="bi bi-file-earmark-excel"></i> 模块A: 规则化
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% block nav_b %}{% endblock %}" href="/module-b">
                            <i class="bi bi-cpu"></i> 模块B: 转三元组
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% block nav_c %}{% endblock %}" href="/module-c">
                            <i class="bi bi-check-circle"></i> 模块C: 审核
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% block nav_d %}{% endblock %}" href="/module-d">
                            <i class="bi bi-database"></i> 模块D: 入库
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
